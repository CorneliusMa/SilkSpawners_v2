version: 2
updates:

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
      semver-major-days: 90
    ignore:
      - dependency-name: "org.bukkit:bukkit"
      - dependency-name: "org.spigotmc:spigot-api"
      - dependency-name: "dev.folia:folia-api"
      - dependency-name: "com.github.brcdev-minecraft:shopgui-api"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"
      include: "scope"
